# Price card: provider rates, sampling settings, storage horizon, cache TTLs.
# Every value carries a `source:` tag per pilot plan § 9 reproducibility rule.
# `pilot:5.8#N`  = pilot decision-matrix row reference
# `pilot:6`      = pilot plan § 6 decisions table
# `lit:KEY`      = literature citation key
# `rule:NAME`    = methodology rule
# `provider:URL` = provider-doc snapshot

# ─── Sampling settings (locked workspace-wide) ────────────────────────────────
sampling:
  temperature:
    value: 0
    source: pilot:5.8#sampling-temperature
  top_p:
    value: 1.0
    source: rule:greedy-decoding-default

# ─── Cost-attribution rule (locked) ───────────────────────────────────────────
cost_attribution:
  rule: run_index_0_only
  source: rule:option-A
  description: >
    Cost is computed from run_index == 0 only.
    Runs 2..N contribute to variance reporting but not to deployment cost.
    Avoids artificial cache amplification within the variance protocol.

# ─── Storage rate (locked) ────────────────────────────────────────────────────
storage:
  rate_usd_per_gib_month:
    value: 0.023
    source: rule:s3-standard-2026-04
    description: AWS S3 Standard list price as of 2026-04
  study_horizon_days:
    value: 90
    source: pilot:6

# ─── Local-equivalent GPU rate (locked) ───────────────────────────────────────
gpu:
  h100_usd_per_hour:
    value: 2.00
    source: rule:lambda-public-list-2026-04
    description: Lambda Cloud public list price for H100 PCIe as of 2026-04
  h100_usd_per_second: 0.000556

# ─── Provider rate cards (verified 2026-04-29; verify on every run) ───────────
# All rates in USD per 1M tokens unless noted.
providers:
  anthropic:
    snapshot_date: 2026-04-29
    source: provider:platform.claude.com/docs/en/build-with-claude/prompt-caching
    cache_ttl_minutes:
      ephemeral_default: 5
      extended_tier: 60
    cache_ttl_source: thesis-msc/notes/cache_ttl_per_provider.md
    models:
      claude-sonnet-4-6:
        input_uncached: 3.00
        input_cached_read: 0.30
        cache_write_5m: 3.75
        cache_write_1h: 6.00
        output: 15.00
      claude-opus-4-7:
        input_uncached: 5.00
        input_cached_read: 0.50
        cache_write_5m: 6.25
        cache_write_1h: 10.00
        output: 25.00

  openai:
    snapshot_date: 2026-05-02
    source: provider:developers.openai.com/api/docs/guides/prompt-caching
    cache_ttl_minutes:
      automatic_default: 60   # short-window observed; verify per-account
      extended_24h_tier: 1440 # GPT-5.1+ via prompt_cache_retention=24h
    cache_ttl_source: thesis-msc/notes/cache_ttl_per_provider.md
    models:
      gpt-5.4:
        input_uncached_below_272k: 2.50
        input_uncached_above_272k: 5.00
        input_cached_read: 0.25
        output_below_272k: 15.00
        output_above_272k: 22.50
        context_window_tokens: 1050000
        source: provider:developers.openai.com/api/docs/models/gpt-5.4

      gpt-5.4-pro:
        input_uncached: 15.00      # verify; pro tier typically 3x base
        input_cached_read: 1.50
        output: 90.00
        context_window_tokens: 1050000
        verification_required: true
        source: provider:developers.openai.com/api/docs/models/gpt-5.4-pro

      gpt-5.5:
        input_uncached_below_272k: 5.00
        input_uncached_above_272k: 10.00
        input_cached_read: 0.50
        output_below_272k: 30.00
        output_above_272k: 45.00
        context_window_tokens: 1050000
        source: provider:developers.openai.com/api/docs/models/gpt-5.5

      gpt-5.5-pro:
        input_uncached: 30.00
        input_cached_read: 3.00      # verify; cache discount typically 10%
        output: 180.00
        context_window_tokens: 1050000
        verification_required: true
        source: provider:developers.openai.com/api/docs/models/gpt-5.5-pro

  google:
    snapshot_date: 2026-04-29
    source: provider:ai.google.dev/gemini-api/docs/caching
    cache_ttl_minutes:
      cached_content_default: 60
      cached_content_max: 1440  # configurable per CachedContent.ttl
    cache_ttl_source: thesis-msc/notes/cache_ttl_per_provider.md
    models:
      gemini-3.1-pro-preview:
        input_uncached_below_200k: 2.00
        input_uncached_above_200k: 4.00
        input_cached_read: 0.50
        output_below_200k: 12.00
        output_above_200k: 18.00

  dashscope:
    snapshot_date: 2026-04-29
    source: provider:alibabacloud.com/help/en/model-studio/context-cache
    cache_ttl_minutes:
      ephemeral_only: 5  # NO extended tier; binding constraint per audit
    cache_ttl_source: thesis-msc/notes/cache_ttl_per_provider.md
    status: not_accessible  # DashScope not used in this setup
    models:
      qwen3.6-27b:
        input_uncached: 0.80    # verify on first call; placeholder
        input_cached_read: 0.20 # verify on first call; placeholder
        output: 1.20            # verify on first call; placeholder
        verification_required: true

  xai:
    snapshot_date: 2026-05-02
    source: provider:docs.x.ai/docs/api-reference
    cache_ttl_minutes:
      automatic_default: 60  # verify; xAI exposes automatic caching, TTL not publicly documented
    cache_ttl_source: provider:openrouter.ai/docs/guides/best-practices/prompt-caching
    notes: >
      xAI cache-tier TTL is not publicly documented; OpenRouter lists xAI
      under automatic-caching providers but doesn't specify the window.
      Verification on first KV-cache check.
    models:
      grok-4.3:
        input_uncached: 3.00      # verify on first call
        input_cached_read: 0.30   # verify
        output: 15.00             # verify
        context_window_tokens: 256000
        verification_required: true
        source: provider:docs.x.ai/docs/api-reference

      grok-4-1-fast-non-reasoning:
        input_uncached: 0.50      # verify
        input_cached_read: 0.05
        output: 1.50
        context_window_tokens: 256000
        verification_required: true

      grok-4-fast-reasoning:
        input_uncached: 0.50
        input_cached_read: 0.05
        output: 1.50
        context_window_tokens: 256000
        verification_required: true

      grok-4.20-0309-non-reasoning:
        input_uncached: 1.00
        input_cached_read: 0.10
        output: 5.00
        context_window_tokens: 256000
        verification_required: true

      grok-4.20-0309-reasoning:
        input_uncached: 1.00
        input_cached_read: 0.10
        output: 5.00
        context_window_tokens: 256000
        verification_required: true

  openrouter:
    snapshot_date: 2026-05-02
    source: provider:openrouter.ai/api/v1/models
    cache_ttl_minutes:
      varies_by_route: true  # OpenRouter routes to underlying providers
    cache_ttl_source: provider:openrouter.ai/docs/quickstart
    notes: >
      OpenRouter is an aggregator that routes requests to underlying
      providers (Groq, DeepInfra, Together, Fireworks, etc.). Cache
      behaviour and TTL therefore vary by which provider serves the
      request. Prompt caching is supported in aggregate; exact TTL
      should be verified at run time via the per-row
      `cached_input_tokens` field.
    models:
      deepseek/deepseek-v4-pro:
        input_uncached: 0.43
        input_cached_read: 0.004
        output: 0.87
        context_window_tokens: 1048576
        source: provider:openrouter.ai/deepseek/deepseek-v4-pro
        notes: >
          Cache-read price is 1/100th of uncached input — repeated-context
          inference becomes nearly free at scale on this row.

      deepseek/deepseek-v4-flash:
        input_uncached: 0.14
        input_cached_read: 0.003
        output: 0.28
        context_window_tokens: 1048576
        source: provider:openrouter.ai/deepseek/deepseek-v4-flash
        notes: Cheaper DeepSeek-V4 variant; same long-context window.

      moonshotai/kimi-k2.6:
        input_uncached: 0.60      # verify on first call
        input_cached_read: 0.15   # verify
        output: 2.50              # verify
        context_window_tokens: 262142
        verification_required: true
        source: provider:openrouter.ai/moonshotai/kimi-k2.6
        notes: 256k context cap. Restricted to QASPER + truncated NovelQA.

