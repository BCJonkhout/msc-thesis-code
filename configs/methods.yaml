# Per-method hyperparameters, lit-anchored from the original method papers.
# NOT empirically calibrated on this thesis's pool — the benchmark tests
# methods AS PUBLISHED. Optional ±1-step ablation around each value is
# allowed as confirmation, not tuning. See pilot plan § 5 Step 5.
#
# Every value carries a `source:` tag.

flat_full_context:
  # No preprocessing. Relies on the serving stack's prefix caching.
  cache_aware: true
  source: lit:kwon2023pagedattention
  notes: >
    Cache configuration is provider-specific and lives in price_card.yaml
    cache_ttl_minutes_per_provider; main study uses each provider's
    native extended caching for the chosen primary, cross-model check
    pins all providers to 5-min ephemeral.

naive_rag:
  chunk_size_tokens:
    value: 384
    source: lit:lewis2020retrieval
    rationale: >
      Standard RAG-defaults range (256–512); centre value chosen for a
      balanced quality/cost point.
  top_k:
    value: 8
    source: lit:lewis2020retrieval
    rationale: Standard RAG-defaults range (4–16); centre value.
  overlap:
    value: 0
    source: lit:sarthi2024raptor
    rationale: >
      No-overlap chunking matches RAPTOR's reference implementation
      for fair encoder comparison.
  chunker: sentence_boundary_aware
  chunker_source: lit:robertson2009probabilistic

raptor:
  retrieval_k:
    value: 10
    source: lit:sarthi2024raptor
    rationale: >
      Sarthi et al. 2024 § 4 reports "approximately top-20 nodes
      within a 2000-token budget" for collapsed-tree retrieval at
      inference; the budget cap dominates so the integer-k value
      is operating-point-dependent. Our code uses k=10 with the
      2000-token retrieval budget, which selects roughly the
      paper's stable point on QASPER-scale documents.
  retrieval_max_tokens:
    value: 2000
    source: lit:sarthi2024raptor
    rationale: Paper § 4 retrieval-budget cap.
  tree_depth_cap:
    value: 5
    source: lit:sarthi2024raptor
    rationale: >
      Sarthi et al. 2024 § 3.1 caps the recursive tree at 5
      layers; the parthsarthi03/raptor reference repo enforces
      the same cap (`tb_num_layers=5`). Earlier draft of this
      file said 4 — transcription error from Step 0 planning,
      reconciled in Step 5.
  leaf_chunk_max_tokens:
    value: 100
    source: lit:sarthi2024raptor
    rationale: Paper § 3.1 leaf-chunk size for the recursive split.
  summary_max_tokens:
    value: 200
    source: lit:sarthi2024raptor
    rationale: RAPTOR official repo SummarizationModels.py default.
  retrieval_strategy:
    value: collapsed_tree
    source: lit:sarthi2024raptor
    rationale: >
      Reported in the original paper as the stronger default vs
      tree-traversal across their experimental settings.
  clustering_seed:
    value: 42
    source: rule:seed-42-everywhere

graphrag:
  # The pilot uses a from-scratch faithful implementation of
  # Edge et al. 2024 § 3.1 against the pilot's existing primitives
  # (see code/src/pilot/architectures/graphrag.py) rather than
  # Microsoft's `graphrag` package. This was a Step 3 decision to
  # avoid the 10-class LLMCompletion shim required to make the
  # official package observable through the cost ledger. The
  # parameters below are reconciled with the from-scratch code.
  chunk_size_tokens:
    value: 600
    source: lit:edge2024local
    rationale: Edge et al. 2024 § 4.1.1 chunk size.
  chunk_overlap_tokens:
    value: 100
    source: lit:edge2024local
    rationale: Edge et al. 2024 § 4.1.1 chunk overlap.
  community_detection:
    algorithm: louvain
    source: rule:from-scratch-implementation-step3
    rationale: >
      Paper uses hierarchical Leiden via graspologic; from-scratch
      implementation uses NetworkX 3.x's built-in Louvain (flat
      communities). Documented as a deliberate simplification
      in graphrag.py module docstring; Phase G can revisit if
      hierarchical-community ablation is added to the optional
      grid.
    seed:
      value: 42
      source: rule:seed-42-everywhere
  local_search_top_k_entities:
    value: 8
    source: lit:edge2024local
    rationale: >
      Edge et al. 2024 § 4 local-search default for entity
      retrieval at query time.
  local_search_top_k_reports:
    value: 3
    source: lit:edge2024local
    rationale: >
      Edge et al. 2024 § 4 local-search default for community-report
      retrieval at query time.
  entity_extraction_prompt:
    value: microsoft_graphrag_default
    source: lit:edge2024local
  per_document_cost_guard_usd:
    value: 5.00
    source: pilot:5.8#11
    rationale: >
      Per-document budget guard: refuse to run entity extraction if
      estimated cost exceeds this. Decision matrix #11 escalates to
      open-weights entity extraction if average exceeds $20/novel.

# ─── Optional ablation grid (confirmation, not tuning) ────────────────────────
optional_ablation:
  enabled: false  # set true if running the optional ±1-step ablation
  source: pilot:5.8#14-16
  cells:
    naive_rag:
      top_k_alternates: [4, 16]
    raptor:
      retrieval_k_alternates: [8]
    graphrag:
      community_selection_depth_alternates: [1]
  acceptance_rule: >
    If any ablation cell beats the lit-anchored value by > 0.05 absolute
    on calibration quality, escalate to supervisor decision rather than
    silently switching.
