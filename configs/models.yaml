# ─── Open-weights candidates (enter smoke; cache support is the gate) ────────
# All open-weights routes go through OpenRouter; OpenRouter exposes
# automatic prompt caching for OpenAI / DeepSeek / Grok / Groq /
# Moonshot / Gemini 2.5 routes. Qwen routes do NOT expose caching,
# which is why we replaced Qwen3.6-flash with DeepSeek + Moonshot.
open_weights_candidates:
  - id: deepseek/deepseek-v4-pro
    provider: openrouter
    context_window_tokens: 1000000  # verify on first call
    context_window_verification_required: true
    cache_supported: true  # DeepSeek route exposes automatic caching via OpenRouter
    cache_tier_source: provider:openrouter.ai/docs/guides/best-practices/prompt-caching
    license: open-weights  # DeepSeek-V4 line; verify exact license
    released: 2026
    source: pilot:5.8#6
    notes: >
      Primary open-weights candidate as of 2026-05-02 (replaces
      qwen/qwen3.6-flash which had no caching exposure on OpenRouter).
      DeepSeek-V4-Pro is the flagship dense variant; pro tier is more
      expensive than flash but has better long-context behaviour.

  - id: deepseek/deepseek-v4-flash
    provider: openrouter
    context_window_tokens: 1000000  # verify
    context_window_verification_required: true
    cache_supported: true
    cache_tier_source: provider:openrouter.ai/docs/guides/best-practices/prompt-caching
    license: open-weights
    released: 2026
    source: pilot:5.8#6
    notes: Cheaper DeepSeek-V4 variant; fallback if Pro is over budget.

  - id: moonshotai/kimi-k2.6
    provider: openrouter
    context_window_tokens: 262142  # 256K native (~2^18); verified via OpenRouter API 2026-04
    cache_supported: true  # Moonshot route exposes automatic caching
    cache_tier_source: provider:openrouter.ai/docs/guides/best-practices/prompt-caching
    license: open-weights
    released: 2026-04
    source: pilot:5.8#6
    notes: >
      Caveat: Kimi K2.6 native context is 262,142 tokens (~256k), well
      below the 780k NovelQA threshold. This candidate cannot serve
      full NovelQA novels and is restricted to QASPER + truncated
      NovelQA in the cross-model check. Useful as a third open-weights
      row on the smaller subset.

# ─── Rejected / superseded candidates (documented for the audit trail) ───────
rejected_candidates:
  - id: qwen/qwen3.6-flash
    provider: openrouter
    context_window_tokens: 1000000
    license: Apache-2.0
    released: 2026
    rejection_reason: no_caching_via_openrouter
    rejection_source: provider:openrouter.ai/docs/guides/best-practices/prompt-caching
    rejection_detail: >
      OpenRouter's prompt-caching docs list caching support for OpenAI,
      DeepSeek, Grok, Groq, Moonshot, and Gemini 2.5 routes only.
      Qwen routes do not expose cached_input_tokens. KV-cache
      verification at 12k and 100k both confirmed cached_tokens=0 with
      no measurable latency improvement on the second call. The
      open-weights row would have to pay uncached costs throughout,
      which is recoverable but undesirable. Replaced by DeepSeek + Moonshot
      (both on the caching-supported list).

  - id: qwen3.6-27b
    provider: dashscope
    context_window_tokens_native: 262144
    license: Apache-2.0
    released: 2026-04-22
    rejection_reason: not_accessible
    rejection_detail: DashScope access not available in this experimental setup.

  - id: minimax-m2.7
    provider: minimax
    context_window_tokens: 1000000
    license: open-weights
    released: 2026-04
    rejection_reason: caching_unverified
    rejection_detail: >
      MiniMax first-party API caching support not in OpenRouter's
      caching-supported list. Could be added via a direct MiniMax
      adapter if a future revision needs it.

  - id: gemma-4-26b-a4b-it
    provider: groq
    context_window_tokens: 256000
    license: open-weights
    released: 2026-04-02
    rejection_reason: context_below_threshold
    rejection_source: pilot:5.8#5
    rejection_detail: >
      256k context insufficient for the NovelQA workload. The longest
      non-B48 NovelQA novel is ~772k tokens, requiring ~780k usable
      context after prompt overhead. 256k < 780k threshold.

  - id: gemma-4-31b-it
    provider: groq
    context_window_tokens: 256000
    license: open-weights
    released: 2026-04-02
    rejection_reason: context_below_threshold
    rejection_source: pilot:5.8#5
    rejection_detail: >
      Same reason as gemma-4-26b-a4b-it.

# ─── Final answerer choices (TBD; locked by pilot Step 7) ─────────────────────
final_answerer:
  primary: TBD
  primary_source: pilot:5.8#6 + pilot:5.8#16
  primary_selection_rule: >
    Cheapest closed candidate that passes smoke (decision #6) AND
    maintains architecture rank in cross-model check (decision #16
    with Kendall's tau >= 0.67).

  alternate_for_cross_model_check: TBD
  alternate_source: pilot:5.8#16
  alternate_selection_rule: >
    One alternate closed candidate from a different provider family;
    used in the cross-model stability subsample alongside the primary
    and one open-weights candidate. Drops back to primary-only after
    the cross-model check resolves.

  open_weights_for_cross_model_check: TBD
  open_weights_source: pilot:5.8#16

  summary_model: TBD
  summary_model_source: pilot:5.8#10
  summary_model_rule: >
    Same family as primary at cheaper tier (Haiku 4.5 if primary is
    Sonnet 4.6, Gemini 3.1 Flash if primary is Gemini 3.1 Pro Preview,
    GPT-5.4 mini if primary is GPT-5.4). Validated by paired
    RAPTOR-build comparison; cheap tier kept if |Q_A − Q_B| <= 0.02.

# ─── Smoke-phase rules (Step 1) ───────────────────────────────────────────────
smoke:
  source: pilot:5.8#6
  contexts:
    - tokens: 5000
      kind: qasper_smoke
    - tokens: 150000
      kind: novelqa_smoke
    - tokens: 600000
      kind: novelqa_smoke_long
  queries_per_context: 1
  pass_conditions:
    latency:
      max_minutes_on_600k: 10
    parsing:
      max_malformed_per_3_smokes: 1
  source_per_pass_condition: pilot:5.8#6

# ─── Cross-model stability check (Phase F, decision #16) ──────────────────────
cross_model_check:
  source: pilot:5.8#16
  subsample:
    novels: 10
    qasper_papers: 30
  N: 1
  cache_pin_minutes: 5
  cache_pin_source: pilot:5.8#16
  models_under_test:
    - chosen_primary
    - one_alternate_closed
    - one_open_weights
  decision_rule:
    metric: kendall_tau
    threshold: 0.67
    threshold_source: pilot:5.8#16
    rationale: >
      tau >= 0.67 corresponds to at most one rank swap among the
      four architectures. Architecture-matters-more-than-answerer
      assumption holds when the rank order is preserved across all
      three answerer models.
