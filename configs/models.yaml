# Model slate for the pilot. Final primary answerer is determined by
# Phase F cross-model stability check (decision #16); slate of candidates
# that enter the smoke phase is locked here.
#
# See pilot plan § 3.3 and § 5.8 decisions #6, #16.

# ─── Closed answerer slate (enter smoke) ──────────────────────────────────────
