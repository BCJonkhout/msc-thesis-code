# Model slate for the pilot. Final primary answerer is determined by
# Phase F cross-model stability check (decision #16); slate of candidates
# that enter the smoke phase is locked here.
#
# See pilot plan § 3.3 and § 5.8 decisions #6, #16.

# ─── Closed answerer slate (enter smoke) ──────────────────────────────────────
closed_candidates:
  - id: gemini-3.1-pro-preview
    provider: google
    context_window_tokens: 1000000
    cache_tier: cached_content_configurable
    cache_tier_source: provider:ai.google.dev/gemini-api/docs/caching
    source: pilot:5.8#6

  - id: gemini-3.1-flash-lite-preview
    provider: google
    context_window_tokens: 1048576
    cache_tier: cached_content_configurable
    cache_tier_source: provider:ai.google.dev/gemini-api/docs/caching
    source: pilot:5.8#6
    notes: >
      Lite variant of Gemini 3.1 Flash with 1M context. The
      gemini-3.1-flash-live-preview alternative is rejected because
      its live-preview surface caps at 131k context, which cannot
      serve NovelQA's longest non-B48 novel (~772k tokens).

  - id: gemini-flash-latest
    provider: google
    context_window_tokens: 1048576
    cache_tier: cached_content_configurable
    cache_tier_source: provider:ai.google.dev/gemini-api/docs/caching
    source: pilot:5.8#6
    notes: Alias to current best Gemini Flash; auto-advances as Google ships revisions.

  - id: grok-4.3
    provider: xai
    context_window_tokens: 2000000  # xAI Grok-4 family documented at 2M tokens
    cache_tier: automatic_via_xai
    cache_tier_source: provider:x.ai/api
    source: pilot:5.8#6
    notes: >
      xAI's flagship reasoning model. Grok is closed-weights; this is
      a fourth closed-frontier vendor in the cross-model check.

  - id: grok-4-1-fast-non-reasoning
    provider: xai
    context_window_tokens: 2000000
    cache_tier: automatic_via_xai
    cache_tier_source: provider:x.ai/api
    source: pilot:5.8#6
    notes: Cheaper Grok variant; fast non-reasoning mode.

  - id: grok-4-fast-reasoning
    provider: xai
    context_window_tokens: 2000000
    cache_tier: automatic_via_xai
    cache_tier_source: provider:x.ai/api
    source: pilot:5.8#6
    notes: Reasoning variant of grok-4-fast; tests reasoning-mode dimension on a fast tier.

  - id: grok-4.20-0309-non-reasoning
    provider: xai
    context_window_tokens: 2000000
    cache_tier: automatic_via_xai
    cache_tier_source: provider:x.ai/api
    source: pilot:5.8#6
    notes: Mid-tier Grok variant from the 4.20 line.

  - id: grok-4.20-0309-reasoning
    provider: xai
    context_window_tokens: 2000000
    cache_tier: automatic_via_xai
    cache_tier_source: provider:x.ai/api
    source: pilot:5.8#6
    notes: Reasoning variant of grok-4.20-0309; pairs with the non-reasoning row to test reasoning-mode delta.

# ─── Open-weights candidates (enter smoke; cache support is the gate) ────────
# All open-weights routes go through OpenRouter; OpenRouter exposes
# automatic prompt caching for OpenAI / DeepSeek / Grok / Groq /
# Moonshot / Gemini 2.5 routes. Qwen routes do NOT expose caching,
# which is why we replaced Qwen3.6-flash with DeepSeek + Moonshot.
open_weights_candidates:
  - id: deepseek/deepseek-v4-pro
    provider: openrouter
    context_window_tokens: 1000000  # verify on first call
    context_window_verification_required: true
    cache_supported: true  # DeepSeek route exposes automatic caching via OpenRouter
    cache_tier_source: provider:openrouter.ai/docs/guides/best-practices/prompt-caching
    license: open-weights  # DeepSeek-V4 line; verify exact license
    released: 2026
    source: pilot:5.8#6
    notes: >
      Primary open-weights candidate as of 2026-05-02 (replaces
      qwen/qwen3.6-flash which had no caching exposure on OpenRouter).
      DeepSeek-V4-Pro is the flagship dense variant; pro tier is more
      expensive than flash but has better long-context behaviour.

  - id: deepseek/deepseek-v4-flash
    provider: openrouter
    context_window_tokens: 1000000  # verify
    context_window_verification_required: true
    cache_supported: true
    cache_tier_source: provider:openrouter.ai/docs/guides/best-practices/prompt-caching
    license: open-weights
    released: 2026
    source: pilot:5.8#6
    notes: Cheaper DeepSeek-V4 variant; fallback if Pro is over budget.

  - id: moonshotai/kimi-k2.6
    provider: openrouter
    context_window_tokens: 262142  # 256K native (~2^18); verified via OpenRouter API 2026-04
    cache_supported: true  # Moonshot route exposes automatic caching
    cache_tier_source: provider:openrouter.ai/docs/guides/best-practices/prompt-caching
    license: open-weights
    released: 2026-04
    source: pilot:5.8#6
    notes: >
      Caveat: Kimi K2.6 native context is 262,142 tokens (~256k), well
      below the 780k NovelQA threshold. This candidate cannot serve
      full NovelQA novels and is restricted to QASPER + truncated
      NovelQA in the cross-model check. Useful as a third open-weights
      row on the smaller subset.

# ─── Rejected / superseded candidates (documented for the audit trail) ───────
rejected_candidates:
  - id: qwen/qwen3.6-flash
    provider: openrouter
    context_window_tokens: 1000000
    license: Apache-2.0
    released: 2026
    rejection_reason: no_caching_via_openrouter
    rejection_source: provider:openrouter.ai/docs/guides/best-practices/prompt-caching
    rejection_detail: >
      OpenRouter's prompt-caching docs list caching support for OpenAI,
      DeepSeek, Grok, Groq, Moonshot, and Gemini 2.5 routes only.
      Qwen routes do not expose cached_input_tokens. KV-cache
      verification at 12k and 100k both confirmed cached_tokens=0 with
      no measurable latency improvement on the second call. The
      open-weights row would have to pay uncached costs throughout,
      which is recoverable but undesirable. Replaced by DeepSeek + Moonshot
      (both on the caching-supported list).

  - id: qwen3.6-27b
    provider: dashscope
    context_window_tokens_native: 262144
    license: Apache-2.0
    released: 2026-04-22
    rejection_reason: not_accessible
    rejection_detail: DashScope access not available in this experimental setup.

  - id: minimax-m2.7
    provider: minimax
    context_window_tokens: 1000000
    license: open-weights
    released: 2026-04
    rejection_reason: caching_unverified
    rejection_detail: >
      MiniMax first-party API caching support not in OpenRouter's
      caching-supported list. Could be added via a direct MiniMax
      adapter if a future revision needs it.

  - id: gemma-4-26b-a4b-it
    provider: groq
    context_window_tokens: 256000
    license: open-weights
    released: 2026-04-02
    rejection_reason: context_below_threshold
    rejection_source: pilot:5.8#5
    rejection_detail: >
      256k context insufficient for the NovelQA workload. The longest
      non-B48 NovelQA novel is ~772k tokens, requiring ~780k usable
      context after prompt overhead. 256k < 780k threshold.

  - id: gemma-4-31b-it
    provider: groq
    context_window_tokens: 256000
    license: open-weights
    released: 2026-04-02
    rejection_reason: context_below_threshold
    rejection_source: pilot:5.8#5
    rejection_detail: >
      Same reason as gemma-4-26b-a4b-it.

  - id: claude-sonnet-4-6
    provider: anthropic
    context_window_tokens: 1000000
    license: closed
    rejection_reason: rate_limit_blocks_multi_call_workload
    rejection_source: empirical:step_2_kvcache_2026-05-02
    rejection_detail: >
      Anthropic's account-tier rate limit (30,000 input tokens per
      minute, rolling) is structurally incompatible with the
      repeated-context workload pattern this pilot measures: the cost
      model assumes many consecutive queries against the same long
      document, and Step 2 KV-cache verification exercises that pattern
      at minimum scale. Two consecutive 100k-token verification calls
      blew the rate limit (RateLimitError 429 on call 2). Even after a
      credit top-up the structural rate-limit cap persisted: the limit
      is on input-token throughput, not on credits. A higher Anthropic
      tier would lift the cap but is not available on this account.
      The pilot's amortization-of-document-cost claim cannot be
      empirically demonstrated on Anthropic without exceeding the
      tier limit, which would make full-NovelQA runs operationally
      fragile and inflate wall-clock latency through forced waits.
      Therefore the entire Anthropic family is removed from the active
      slate. Reinstateable on a higher Anthropic tier; the cache
      primitive itself (cache_control: ephemeral; 1h extended tier)
      is documented to work and would not need re-verification on a
      higher tier.

  - id: claude-opus-4-7
    provider: anthropic
    context_window_tokens: 1000000
    license: closed
    rejection_reason: malformed_at_150k_plus_account_tier_limit
    rejection_source: empirical:step_1_smoke_2026-05-02
    rejection_detail: >
      Empirical Step 1 smoke (2026-05-02): 5k passed cleanly after the
      temperature-deprecation fix (Opus 4.7 deprecates the temperature
      parameter; the adapter omits both temperature and top_p for this
      model id). 150k returned an empty string with output_tokens=0 on
      synthetic Lorem-Ipsum content, suggesting the model refuses to
      produce output on highly repetitive prompts. 600k returned
      RateLimitError 429: "request would exceed your organization's
      rate limit of 30,000 input tokens per minute" — a single 600k
      request structurally cannot fit in a 60s window at this account
      tier. Two failure modes compound: empty-response on synthetic
      data and a hard account-tier ceiling that would make NovelQA
      runs operationally fragile. Reinstateable on a higher Anthropic
      tier with a Step 3 retest on real semantic content.

  - id: gpt-5.4
    provider: openai
    context_window_tokens: 1050000
    license: closed
    rejection_reason: account_tier_blocks_long_context
    rejection_source: empirical:step_1_smoke_2026-05-02
    rejection_detail: >
      Empirical Step 1 smoke (2026-05-02): 5k and 150k passed cleanly.
      600k returned RateLimitError 429: "Request too large for gpt-5.4
      (for limit gpt-5.4-long-context) in organization org-..." This
      is an account-tier limit, not a model capability issue. Single
      600k requests are blocked at the tier level, which makes
      full-NovelQA runs (most novels >500k post-B48 exclusion)
      structurally infeasible. Reinstateable with a higher OpenAI
      tier or by restricting GPT-5.4's role to QASPER-only rows in
      Phase F.

  - id: gpt-5.5
    provider: openai
    context_window_tokens: 1050000
    license: closed
    released: 2026-04-23
    rejection_reason: temperature_zero_unsupported
    rejection_source: empirical:step_1_smoke_2026-05-02
    rejection_detail: >
      Empirical Step 1 smoke (2026-05-02) returned 400 BadRequest:
      "Unsupported value: 'temperature' does not support 0 with this
      model. Only the default (1) value is supported." The pilot's
      sampling temperature is fixed at T=0 across all architectures
      per pilot plan § 3.4.3 (consensus answerer setting in QA
      literature, plus the falsifiability requirement to hold
      sampling-temperature constant across architectures). GPT-5.5
      cannot satisfy this constraint and is therefore eliminated.

  - id: gpt-5.4-pro
    provider: openai
    context_window_tokens: 1050000
    license: closed
    rejection_reason: chat_completions_api_unsupported
    rejection_source: empirical:step_1_smoke_2026-05-02
    rejection_detail: >
      Empirical Step 1 smoke (2026-05-02) returned 404:
      "This is not a chat model and thus not supported in the
      v1/chat/completions endpoint. Did you mean to use v1/completions?"
      Pro variant is exposed only through OpenAI's Responses API,
      which is a different I/O surface than the Chat Completions API
      our adapter targets. A separate Responses-API code path would
      be needed; the engineering cost is not justified for a pro
      variant that is ~6x more expensive than gpt-5.4 base, which
      already passes the smoke.

  - id: gpt-5.5-pro
    provider: openai
    context_window_tokens: 1050000
    license: closed
    released: 2026-04-23
    rejection_reason: chat_completions_api_unsupported
    rejection_source: empirical:step_1_smoke_2026-05-02
    rejection_detail: >
      Same as gpt-5.4-pro: Responses-API only.

# ─── Final answerer choices (locked at Step 7 / Phase F.1) ────────────────────
final_answerer:
  primary: gemini-3.1-flash-lite-preview
  primary_source: pilot:5.8#6 + pilot:5.8#16 + empirical:phase_f1_2026-05-08
  primary_selection_rule: >
    Cheapest closed candidate that passes smoke (decision #6) AND
    maintains architecture rank in cross-model check (decision #16
    with Kendall's tau >= 0.67).
  primary_selection_evidence: >
    Phase F.1 (2026-05-08, run_id 20260508-997b9fdc): full
    4-architecture × QASPER 20Q sweep on Flash Lite ranked the
    architectures naive_rag (0.422) > flat (0.366) > raptor
    (0.258) > graphrag (0.034). The Gemini Pro reference
    (consolidated from runs 20260507-bd223851 + 20260508-6c08d55d
    + 20260508-f2f02fde) ranked them naive_rag (0.371) > flat
    (0.340) > raptor (0.267) > graphrag (0.048). Kendall's
    tau-b = +1.0 over six pairs (6 concordant / 0 discordant)
    >= 0.67 -> STABLE_RANK -> cheapest-passing rule fires.
    Flash Lite is ~20x cheaper than Gemini Pro at the same
    20Q-Flat scope ($0.010 vs $0.192 per sweep) and ~5x cheaper
    on the full 4-architecture sweep ($0.126 vs $0.403). Verdict
    written to outputs/sanity/phase_f1_kendall.json.

  alternate_for_cross_model_check: TBD
  alternate_source: pilot:5.8#16
  alternate_selection_rule: >
    One alternate closed candidate from a different provider family
    (i.e. NOT Google), used in the cross-model stability subsample
    alongside the primary and one open-weights candidate. Drops back
    to primary-only after the cross-model check resolves. Phase F.2
    candidates available on the active slate: grok-4-1-fast-non-
    reasoning, grok-4.20-0309-non-reasoning, grok-4.3 (xAI family).

  open_weights_for_cross_model_check: TBD
  open_weights_source: pilot:5.8#16
  open_weights_candidates: >
    deepseek/deepseek-v4-flash ($0.013/20Q-Flat) and deepseek/
    deepseek-v4-pro ($0.041/20Q-Flat) on the active slate. Either
    can serve as the open-weights row once multi-provider routing
    is exercised against a non-Google primary; with Flash Lite as
    primary, the open-weights row only matters for the optional
    cross-model check. Run via --answerer-provider openrouter
    --answerer-model deepseek/deepseek-v4-flash --summary-provider
    google --summary-model gemini-3.1-flash-lite-preview.

  summary_model: gemini-3.1-flash-lite-preview
  summary_model_source: pilot:5.8#10 + empirical:step_3_2026-05-08
  summary_model_rule: >
    Same family as primary at cheaper tier. Currently locked to
    gemini-3.1-flash-lite-preview as the cheap-tier summary model
    used by RAPTOR + GraphRAG preprocessing in Step 3 dry-runs;
    final pairing locks against the chosen primary in Phase F.
    For a Gemini-family primary the pairing is trivial
    (Pro answerer + Flash Lite summary). For a non-Google primary,
    multi-provider routing is required (work item #1 in Step 7);
    summary stage stays on Flash Lite because cheap-tier
    preprocessing tracks the Step 3 asymmetric-tier finding
    rather than the answerer family. Validated by paired
    RAPTOR-build comparison; cheap tier kept if |Q_A − Q_B| <= 0.02.

# ─── Smoke-phase rules (Step 1) ───────────────────────────────────────────────
smoke:
  source: pilot:5.8#6
  contexts:
    - tokens: 5000
      kind: qasper_smoke
    - tokens: 150000
      kind: novelqa_smoke
    - tokens: 600000
      kind: novelqa_smoke_long
  queries_per_context: 1
  pass_conditions:
    latency:
      max_minutes_on_600k: 10
    parsing:
      max_malformed_per_3_smokes: 1
  source_per_pass_condition: pilot:5.8#6

# ─── Cross-model stability check (Phase F, decision #16) ──────────────────────
cross_model_check:
  source: pilot:5.8#16
  subsample:
    novels: 10
    qasper_papers: 30
  N: 1
  cache_pin_minutes: 5
  cache_pin_source: pilot:5.8#16
  models_under_test:
    - chosen_primary
    - one_alternate_closed
    - one_open_weights
  decision_rule:
    metric: kendall_tau
    threshold: 0.67
    threshold_source: pilot:5.8#16
    rationale: >
      tau >= 0.67 corresponds to at most one rank swap among the
      four architectures. Architecture-matters-more-than-answerer
      assumption holds when the rank order is preserved across all
      three answerer models.
