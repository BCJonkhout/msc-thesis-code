  xai:
    snapshot_date: 2026-05-02
    source: provider:docs.x.ai/docs/api-reference
    cache_ttl_minutes:
      automatic_default: 60
    cache_ttl_source: provider:openrouter.ai/docs/guides/best-practices/prompt-caching
    notes: >
      xAI cache-tier TTL is not publicly documented; OpenRouter lists xAI
      under automatic-caching providers but doesn't specify the window.
      Verification on first KV-cache check.
    models:
      grok-4.3:
        input_uncached: 3.00
        input_cached_read: 0.30      # rule:cache-discount-0.1x of 3.00
        output: 15.00
        context_window_tokens: 2000000
        verification_required: true
        source: provider:docs.x.ai/docs/api-reference

      grok-4-1-fast-non-reasoning:
        input_uncached: 0.50
        input_cached_read: 0.05      # rule:cache-discount-0.1x of 0.50
        output: 1.50
        context_window_tokens: 2000000
        verification_required: true

      grok-4-fast-reasoning:
        input_uncached: 0.50
        input_cached_read: 0.05      # rule:cache-discount-0.1x of 0.50
        output: 1.50
        context_window_tokens: 2000000
        verification_required: true

      grok-4.20-0309-non-reasoning:
        input_uncached: 1.00
        input_cached_read: 0.10      # rule:cache-discount-0.1x of 1.00
        output: 5.00
        context_window_tokens: 2000000
        verification_required: true

      grok-4.20-0309-reasoning:
        input_uncached: 1.00
        input_cached_read: 0.10      # rule:cache-discount-0.1x of 1.00
        output: 5.00
        context_window_tokens: 2000000
        verification_required: true

  openrouter:
    snapshot_date: 2026-05-02
    source: provider:openrouter.ai/api/v1/models
    cache_ttl_minutes:
      varies_by_route: true
    cache_ttl_source: provider:openrouter.ai/docs/quickstart
    notes: >
      OpenRouter is an aggregator that routes requests to underlying
      providers (Groq, DeepInfra, Together, Fireworks, etc.). Cache
      behaviour and TTL therefore vary by which provider serves the
      request. Prompt caching is supported in aggregate; exact TTL
      should be verified at run time via the per-row
      `cached_input_tokens` field.
    models:
      deepseek/deepseek-v4-pro:
        input_uncached: 0.43
        input_cached_read: 0.043     # rule:cache-discount-0.1x of 0.43
        output: 0.87
        context_window_tokens: 1048576
        source: provider:openrouter.ai/deepseek/deepseek-v4-pro
        notes: >
          Uniform 0.1x cache-discount card. The published card prices this
          row's cache read at 1/100th of uncached; this variant uses the
          conservative 1/10th floor instead.

      deepseek/deepseek-v4-flash:
        input_uncached: 0.14
        input_cached_read: 0.014     # rule:cache-discount-0.1x of 0.14
        output: 0.28
        context_window_tokens: 1048576
        source: provider:openrouter.ai/deepseek/deepseek-v4-flash
        notes: Cheaper DeepSeek-V4 variant; same long-context window.

      moonshotai/kimi-k2.6:
        input_uncached: 0.60
        input_cached_read: 0.06      # rule:cache-discount-0.1x of 0.60
        output: 2.50
        context_window_tokens: 262142
        verification_required: true
        source: provider:openrouter.ai/moonshotai/kimi-k2.6
        notes: 256k context cap. Restricted to QASPER + truncated NovelQA.

